<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Vokabelquiz · 2KEC1</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #F7F5F0;
    --surface: #FFFFFF;
    --surface2: #F0EDE6;
    --text: #1A1916;
    --text2: #6B6860;
    --text3: #A8A59E;
    --accent: #2D5F4F;
    --accent-light: #E1F0EB;
    --accent-text: #1A3D30;
    --danger: #C0392B;
    --danger-light: #FDECEA;
    --success: #1D7A55;
    --success-light: #E4F5ED;
    --border: rgba(26,25,22,0.1);
    --border2: rgba(26,25,22,0.06);
    --syn: #7B4F2E;
    --syn-bg: #FDF3EC;
    --ant: #3A3A8C;
    --ant-bg: #EEEEFF;
    --radius: 16px;
    --radius-sm: 10px;
    --shadow: 0 2px 12px rgba(0,0,0,0.08);
    --shadow-lg: 0 8px 32px rgba(0,0,0,0.12);
  }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 0;
    -webkit-font-smoothing: antialiased;
  }

  .app {
    max-width: 480px;
    margin: 0 auto;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  /* Header */
  .header {
    padding: 20px 20px 0;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .header-title {
    font-family: 'DM Serif Display', serif;
    font-size: 22px;
    color: var(--text);
    letter-spacing: -0.3px;
  }

  .header-sub {
    font-size: 12px;
    color: var(--text3);
    margin-top: 2px;
  }

  .restart-btn {
    width: 38px; height: 38px;
    border-radius: 50%;
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--text2);
    font-size: 18px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: background 0.15s;
    flex-shrink: 0;
  }
  .restart-btn:active { background: var(--surface2); }

  /* Mode selector */
  .mode-bar {
    padding: 16px 20px 0;
    display: flex;
    gap: 8px;
    overflow-x: auto;
    scrollbar-width: none;
    -webkit-overflow-scrolling: touch;
  }
  .mode-bar::-webkit-scrollbar { display: none; }

  .mode-pill {
    flex-shrink: 0;
    padding: 6px 14px;
    border-radius: 99px;
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--text2);
    font-size: 13px;
    font-family: 'DM Sans', sans-serif;
    cursor: pointer;
    transition: all 0.15s;
    white-space: nowrap;
  }
  .mode-pill.active {
    background: var(--accent);
    color: #fff;
    border-color: var(--accent);
  }

  /* Progress */
  .progress-wrap {
    padding: 16px 20px 0;
  }
  .progress-meta {
    display: flex;
    justify-content: space-between;
    font-size: 12px;
    color: var(--text3);
    margin-bottom: 8px;
  }
  .progress-track {
    height: 4px;
    background: var(--border2);
    border-radius: 99px;
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    background: var(--accent);
    border-radius: 99px;
    transition: width 0.4s cubic-bezier(.4,0,.2,1);
  }

  /* Stats */
  .stats {
    padding: 16px 20px 0;
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 8px;
  }
  .stat {
    background: var(--surface);
    border-radius: var(--radius-sm);
    padding: 12px 8px;
    text-align: center;
    border: 1px solid var(--border2);
  }
  .stat-num {
    font-family: 'DM Serif Display', serif;
    font-size: 26px;
    line-height: 1;
  }
  .stat-lbl {
    font-size: 11px;
    color: var(--text3);
    margin-top: 4px;
  }
  .stat-num.green { color: var(--success); }
  .stat-num.red { color: var(--danger); }
  .stat-num.blue { color: var(--accent); }

  /* Main card area */
  .card-area {
    flex: 1;
    padding: 20px;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  .question-card {
    background: var(--surface);
    border-radius: var(--radius);
    border: 1px solid var(--border2);
    padding: 32px 24px;
    text-align: center;
    box-shadow: var(--shadow);
    animation: slideUp 0.3s cubic-bezier(.4,0,.2,1);
  }

  @keyframes slideUp {
    from { opacity: 0; transform: translateY(12px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .q-type-badge {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    padding: 4px 12px;
    border-radius: 99px;
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.3px;
    text-transform: uppercase;
    margin-bottom: 20px;
  }
  .badge-ende { background: var(--accent-light); color: var(--accent-text); }
  .badge-deen { background: #EEE8FF; color: #4A3B8C; }
  .badge-syn  { background: var(--syn-bg); color: var(--syn); }
  .badge-ant  { background: var(--ant-bg); color: var(--ant); }

  .q-prompt {
    font-size: 13px;
    color: var(--text3);
    margin-bottom: 10px;
  }
  .q-word {
    font-family: 'DM Serif Display', serif;
    font-size: 32px;
    color: var(--text);
    line-height: 1.2;
    letter-spacing: -0.5px;
  }

  /* Answer area */
  .answer-card {
    background: var(--surface);
    border-radius: var(--radius);
    border: 1px solid var(--border2);
    overflow: hidden;
    box-shadow: var(--shadow);
    animation: slideUp 0.25s cubic-bezier(.4,0,.2,1);
  }

  .answer-main {
    padding: 20px 20px 16px;
    border-bottom: 1px solid var(--border2);
  }
  .answer-lbl {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    color: var(--text3);
    margin-bottom: 6px;
  }
  .answer-val {
    font-family: 'DM Serif Display', serif;
    font-size: 26px;
    color: var(--text);
    letter-spacing: -0.3px;
  }

  .answer-extras {
    padding: 12px 20px;
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
  }
  .extra-tag {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    padding: 5px 12px;
    border-radius: 99px;
    font-size: 13px;
  }
  .extra-tag.syn { background: var(--syn-bg); color: var(--syn); }
  .extra-tag.ant { background: var(--ant-bg); color: var(--ant); }
  .extra-tag-lbl { font-weight: 500; font-size: 11px; text-transform: uppercase; letter-spacing: 0.3px; }

  /* Buttons */
  .btn-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
  }
  .btn {
    padding: 16px 12px;
    border-radius: var(--radius-sm);
    border: none;
    font-family: 'DM Sans', sans-serif;
    font-size: 15px;
    font-weight: 500;
    cursor: pointer;
    transition: transform 0.12s, opacity 0.12s;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    -webkit-tap-highlight-color: transparent;
  }
  .btn:active { transform: scale(0.97); opacity: 0.88; }
  .btn-reveal {
    background: var(--accent);
    color: #fff;
    grid-column: 1 / -1;
    border-radius: var(--radius-sm);
    border: none;
    font-family: 'DM Sans', sans-serif;
    font-size: 15px;
    font-weight: 500;
    padding: 17px;
    cursor: pointer;
    transition: transform 0.12s, opacity 0.12s;
    display: flex; align-items: center; justify-content: center; gap: 8px;
    -webkit-tap-highlight-color: transparent;
    box-shadow: 0 4px 14px rgba(45,95,79,0.25);
  }
  .btn-reveal:active { transform: scale(0.97); opacity: 0.88; }

  .btn-wrong {
    background: var(--danger-light);
    color: var(--danger);
  }
  .btn-correct {
    background: var(--success-light);
    color: var(--success);
  }

  .btn-icon {
    width: 20px; height: 20px;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 13px;
    font-weight: 700;
  }
  .btn-wrong .btn-icon  { background: rgba(192,57,43,0.12); }
  .btn-correct .btn-icon { background: rgba(29,122,85,0.12); }

  /* Finish screen */
  .finish-screen {
    flex: 1;
    padding: 20px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    animation: slideUp 0.35s cubic-bezier(.4,0,.2,1);
  }
  .finish-ring {
    width: 120px; height: 120px;
    border-radius: 50%;
    background: var(--accent-light);
    display: flex; align-items: center; justify-content: center;
    margin-bottom: 24px;
  }
  .finish-pct {
    font-family: 'DM Serif Display', serif;
    font-size: 48px;
    color: var(--accent);
    line-height: 1;
  }
  .finish-title {
    font-family: 'DM Serif Display', serif;
    font-size: 26px;
    margin-bottom: 8px;
  }
  .finish-sub {
    font-size: 14px;
    color: var(--text2);
    margin-bottom: 32px;
  }
  .finish-restart {
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: var(--radius-sm);
    padding: 16px 40px;
    font-size: 16px;
    font-weight: 500;
    font-family: 'DM Sans', sans-serif;
    cursor: pointer;
    box-shadow: 0 4px 14px rgba(45,95,79,0.25);
    transition: transform 0.12s, opacity 0.12s;
  }
  .finish-restart:active { transform: scale(0.97); opacity: 0.88; }

  .hidden { display: none !important; }

  /* Safe area for notch phones */
  @supports (padding: env(safe-area-inset-bottom)) {
    .card-area { padding-bottom: calc(20px + env(safe-area-inset-bottom)); }
  }
</style>
</head>
<body>
<div class="app" id="app">

  <div class="header">
    <div>
      <div class="header-title">Vokabelquiz</div>
      <div class="header-sub">2KEC1 · 43 Vokabeln</div>
    </div>
    <button class="restart-btn" onclick="startQuiz()" title="Neu starten" aria-label="Quiz neu starten">↺</button>
  </div>

  <div class="mode-bar" id="modeBar">
    <button class="mode-pill active" data-mode="all"     onclick="setMode(this,'all')">Alle gemischt</button>
    <button class="mode-pill"        data-mode="en-de"   onclick="setMode(this,'en-de')">EN → DE</button>
    <button class="mode-pill"        data-mode="de-en"   onclick="setMode(this,'de-en')">DE → EN</button>
    <button class="mode-pill"        data-mode="syn"     onclick="setMode(this,'syn')">Synonyme</button>
    <button class="mode-pill"        data-mode="ant"     onclick="setMode(this,'ant')">Antonyme</button>
  </div>

  <div class="progress-wrap">
    <div class="progress-meta">
      <span id="progressLabel">Karte 1 von …</span>
      <span id="progressPct">0 %</span>
    </div>
    <div class="progress-track"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>
  </div>

  <div class="stats">
    <div class="stat"><div class="stat-num green" id="statC">0</div><div class="stat-lbl">Richtig</div></div>
    <div class="stat"><div class="stat-num red"   id="statW">0</div><div class="stat-lbl">Falsch</div></div>
    <div class="stat"><div class="stat-num blue"  id="statL">0</div><div class="stat-lbl">Offen</div></div>
  </div>

  <div class="card-area" id="cardArea">

    <div id="questionCard" class="question-card">
      <div class="q-type-badge badge-ende" id="qBadge">EN → DE</div>
      <div class="q-prompt" id="qPrompt">Wie lautet die deutsche Übersetzung?</div>
      <div class="q-word"   id="qWord">–</div>
    </div>

    <button class="btn-reveal" id="revealBtn" onclick="reveal()">
      <span>Antwort anzeigen</span>
      <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M8 3v10M3 8l5 5 5-5" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>
    </button>

    <div id="answerCard" class="answer-card hidden">
      <div class="answer-main">
        <div class="answer-lbl" id="aLbl">Antwort</div>
        <div class="answer-val" id="aVal">–</div>
      </div>
      <div class="answer-extras" id="aExtras"></div>
    </div>

    <div class="btn-row hidden" id="btnRow">
      <button class="btn btn-wrong"   onclick="answer(false)">
        <span class="btn-icon">✕</span> Falsch
      </button>
      <button class="btn btn-correct" onclick="answer(true)">
        <span class="btn-icon">✓</span> Richtig
      </button>
    </div>

  </div>

  <div class="finish-screen hidden" id="finishScreen">
    <div class="finish-ring">
      <div class="finish-pct" id="finishPct">0%</div>
    </div>
    <div class="finish-title" id="finishTitle">Geschafft!</div>
    <div class="finish-sub"   id="finishSub">0 von 0 Karten richtig</div>
    <button class="finish-restart" onclick="startQuiz()">Nochmal starten</button>
  </div>

</div>
<script>
const VOCAB=[
  {no:1,en:"bulky goods",de:"Sperrgut",syn:"large items",ant:null},
  {no:2,en:"perishable goods",de:"Verderbliche Waren",syn:null,ant:null},
  {no:3,en:"valuable goods",de:"Wertvolle Waren",syn:"precious goods",ant:null},
  {no:4,en:"urgently required goods",de:"Dringend benötigte Waren",syn:null,ant:null},
  {no:5,en:"sea transport",de:"Seetransport",syn:"shipping",ant:null},
  {no:6,en:"inland waterways",de:"Binnenschifffahrt",syn:null,ant:null},
  {no:7,en:"seaworthy packing",de:"Seetüchtige Verpackung",syn:null,ant:null},
  {no:8,en:"congestion",de:"Überlastung",syn:null,ant:null},
  {no:9,en:"theft",de:"Diebstahl",syn:"stealing",ant:null},
  {no:10,en:"pollution",de:"Umweltverschmutzung",syn:"contamination",ant:null},
  {no:11,en:"pollution noise",de:"Lärmbelastung",syn:"noise pollution",ant:null},
  {no:12,en:"road (means of transport)",de:"Straßenverkehr",syn:null,ant:null},
  {no:13,en:"rail (means of transport)",de:"Schienenverkehr",syn:null,ant:null},
  {no:14,en:"air (means of transport)",de:"Luftverkehr",syn:null,ant:null},
  {no:15,en:"consignment",de:"Sendung",syn:"shipment",ant:null},
  {no:16,en:"hauliers",de:"Spediteure",syn:"carriers",ant:null},
  {no:17,en:"enclosures",de:"Anlagen",syn:"attachments",ant:null},
  {no:18,en:"explanation",de:"Erklärung",syn:"clarification",ant:null},
  {no:19,en:"satisfactory solution",de:"Zufriedenstellende Lösung",syn:null,ant:null},
  {no:20,en:"satisfied",de:"zufrieden",syn:"happy",ant:"dissatisfied"},
  {no:21,en:"warranty",de:"Gewährleistung",syn:null,ant:null},
  {no:22,en:"guarantee",de:"Garantie",syn:null,ant:null},
  {no:23,en:"(to) rectify",de:"berichtigen",syn:"correct",ant:null},
  {no:24,en:"(to) prove",de:"beweisen",syn:"demonstrate",ant:null},
  {no:25,en:"law",de:"Gesetz",syn:null,ant:null},
  {no:26,en:"(to) replace",de:"ersetzen",syn:"substitute",ant:null},
  {no:27,en:"(to) repair",de:"reparieren",syn:"fix",ant:null},
  {no:28,en:"dissatisfied",de:"unzufrieden",syn:"unhappy",ant:"satisfied"},
  {no:29,en:"faulty",de:"fehlerhaft",syn:"defective",ant:null},
  {no:30,en:"discoloured",de:"verfärbt",syn:null,ant:null},
  {no:31,en:"carriage forward",de:"unfrei",syn:null,ant:null},
  {no:32,en:"free of charge",de:"kostenlos",syn:"for free",ant:null},
  {no:33,en:"(to) apologise",de:"sich entschuldigen",syn:null,ant:null},
  {no:34,en:"(to) blame so",de:"die Schuld geben",syn:"accuse",ant:null},
  {no:35,en:"(to) interject",de:"einwerfen",syn:"interrupt",ant:null},
  {no:36,en:"courteous",de:"höflich",syn:"polite",ant:"rude"},
  {no:37,en:"refund",de:"Rückerstattung",syn:"repayment",ant:null},
  {no:38,en:"comparably low/high",de:"vergleichsweise niedrig/hoch",syn:"relatively",ant:null},
  {no:39,en:"search engine",de:"Suchmaschine",syn:null,ant:null},
  {no:40,en:"conversion rate",de:"Konversionsrate",syn:"success rate",ant:null},
  {no:41,en:"digit",de:"Ziffer",syn:"number",ant:null},
  {no:42,en:"public utilities",de:"öffentliche Versorgungseinrichtungen",syn:null,ant:null},
  {no:43,en:"stealth advertising",de:"Schleichwerbung",syn:"hidden advertising",ant:null}
];

let deck=[], idx=0, correct=0, wrong=0, currentMode='all';

function shuffle(a){const b=[...a];for(let i=b.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[b[i],b[j]]=[b[j],b[i]];}return b;}

function buildDeck(mode){
  const cards=[];
  for(const v of VOCAB){
    if(mode==='all'||mode==='en-de') cards.push({type:'en-de',v});
    if(mode==='all'||mode==='de-en') cards.push({type:'de-en',v});
    if((mode==='all'||mode==='syn')&&v.syn) cards.push({type:'syn',v});
    if((mode==='all'||mode==='ant')&&v.ant) cards.push({type:'ant',v});
  }
  return shuffle(cards);
}

function setMode(el, mode){
  document.querySelectorAll('.mode-pill').forEach(p=>p.classList.remove('active'));
  el.classList.add('active');
  currentMode=mode;
  startQuiz();
}

function startQuiz(){
  deck=buildDeck(currentMode);
  idx=0; correct=0; wrong=0;
  document.getElementById('finishScreen').classList.add('hidden');
  document.getElementById('cardArea').classList.remove('hidden');
  updateStats(); showCard();
}

function showCard(){
  if(idx>=deck.length){showFinish();return;}
  const {type,v}=deck[idx];
  document.getElementById('answerCard').classList.add('hidden');
  document.getElementById('btnRow').classList.add('hidden');
  document.getElementById('revealBtn').classList.remove('hidden');

  const badges={
    'en-de':['badge-ende','EN → DE'],
    'de-en':['badge-deen','DE → EN'],
    'syn':['badge-syn','Synonym'],
    'ant':['badge-ant','Antonym']
  };
  const prompts={
    'en-de':'Wie lautet die deutsche Übersetzung?',
    'de-en':'Wie lautet die englische Übersetzung?',
    'syn':'Nenne ein englisches Synonym:',
    'ant':'Nenne ein englisches Antonym:'
  };
  const questions={'en-de':v.en,'de-en':v.de,'syn':v.en,'ant':v.en};
  const ansLbls={'en-de':'Deutsche Übersetzung','de-en':'Englische Übersetzung','syn':'Synonym (EN)','ant':'Antonym (EN)'};
  const ansVals={'en-de':v.de,'de-en':v.en,'syn':v.syn,'ant':v.ant};

  const b=document.getElementById('qBadge');
  b.className='q-type-badge '+badges[type][0];
  b.textContent=badges[type][1];
  document.getElementById('qPrompt').textContent=prompts[type];

  const qWordEl=document.getElementById('qWord');
  qWordEl.style.animation='none';
  qWordEl.offsetHeight;
  qWordEl.style.animation='';
  qWordEl.textContent=questions[type];

  document.getElementById('aLbl').textContent=ansLbls[type];
  document.getElementById('aVal').textContent=ansVals[type];

  const ext=document.getElementById('aExtras');
  ext.innerHTML='';
  if(type==='en-de'||type==='de-en'){
    if(v.syn){
      ext.innerHTML+=`<span class="extra-tag syn"><span class="extra-tag-lbl">Syn</span>${v.syn}</span>`;
    }
    if(v.ant){
      ext.innerHTML+=`<span class="extra-tag ant"><span class="extra-tag-lbl">Ant</span>${v.ant}</span>`;
    }
  } else if(type==='syn'||type==='ant'){
    ext.innerHTML+=`<span class="extra-tag syn"><span class="extra-tag-lbl">DE</span>${v.de}</span>`;
  }
  if(!ext.innerHTML) ext.style.display='none'; else ext.style.display='';

  updateStats(); updateProgress();
}

function reveal(){
  document.getElementById('revealBtn').classList.add('hidden');
  document.getElementById('answerCard').classList.remove('hidden');
  document.getElementById('btnRow').classList.remove('hidden');
}

function answer(wasCorrect){
  if(wasCorrect) correct++; else wrong++;
  idx++; showCard();
}

function updateStats(){
  document.getElementById('statC').textContent=correct;
  document.getElementById('statW').textContent=wrong;
  document.getElementById('statL').textContent=Math.max(0,deck.length-idx);
}

function updateProgress(){
  const pct=deck.length>0?Math.round((idx/deck.length)*100):0;
  document.getElementById('progressFill').style.width=pct+'%';
  document.getElementById('progressLabel').textContent='Karte '+(Math.min(idx+1,deck.length))+' von '+deck.length;
  document.getElementById('progressPct').textContent=pct+' %';
}

function showFinish(){
  document.getElementById('cardArea').classList.add('hidden');
  document.getElementById('finishScreen').classList.remove('hidden');
  const total=correct+wrong;
  const pct=total>0?Math.round((correct/total)*100):0;
  document.getElementById('finishPct').textContent=pct+'%';
  document.getElementById('finishSub').textContent=correct+' von '+total+' Karten richtig';
  const titles=['Weiter üben!','Gut gemacht!','Super!','Ausgezeichnet!','Perfekt!'];
  document.getElementById('finishTitle').textContent=pct>=90?titles[4]:pct>=75?titles[3]:pct>=60?titles[2]:pct>=40?titles[1]:titles[0];
  document.getElementById('progressFill').style.width='100%';
  document.getElementById('progressLabel').textContent='Fertig!';
  document.getElementById('progressPct').textContent='100 %';
  document.getElementById('statC').textContent=correct;
  document.getElementById('statW').textContent=wrong;
  document.getElementById('statL').textContent=0;
}

startQuiz();
</script>
